server {
    listen 80;
    server_name xiaodingyang.art www.xiaodingyang.art;

    # 前端静态文件
    root /var/www/myblog/frontend/dist;
    index index.html;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # 静态资源缓存（JS/CSS/图片等带 hash 的文件长期缓存）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # 后端 API 代理
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 上传文件代理（^~ 确保优先于静态资源正则匹配）
    location ^~ /uploads/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
    }

    # Sitemap 代理（由后端动态生成）
    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
    }

    # robots.txt（前端 public 目录中的静态文件）
    location = /robots.txt {
        try_files $uri =404;
    }

    # SPA 前端路由 fallback — 所有未匹配的路径返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
