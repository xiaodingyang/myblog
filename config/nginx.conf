# 部署说明：
# 1) 将下方 ssl_certificate / ssl_certificate_key 换成你服务器上证书路径（与 certbot 生成的一致即可）。
# 2) root 路径按实际构建产物调整（Umi 产物在 frontend/dist）。
# 3) 下方 proxy_pass 端口须与 PM2 `blog-backend` 一致（见 backend/ecosystem.config.js，默认 8081）。
#
# 百度搜索资源平台「Robots」若报「robots 文件设置了重定向」，通常是因为抓取到的 URL 上 robots.txt
# 返回了 301/302（例如整站 HTTP→HTTPS、裸域→www）。以下对 /robots.txt 单独直出 200，不参与跳转。

# -----------------------------------------------------------------------------
# HTTP：仅 robots.txt 直接返回内容；其余统一跳转到 HTTPS 主域名（www）
# -----------------------------------------------------------------------------
server {
    listen 80;
    server_name xiaodingyang.art www.xiaodingyang.art;

    root /var/www/myblog/frontend/dist;

    location = /robots.txt {
        default_type text/plain;
        charset utf-8;
        try_files $uri =404;
        access_log off;
    }

    location / {
        return 301 https://www.xiaodingyang.art$request_uri;
    }
}

# -----------------------------------------------------------------------------
# HTTPS 裸域：仅 robots.txt 直出；其余跳转到 www（避免裸域 robots 多一次 301）
# -----------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    server_name xiaodingyang.art;

    # ssl_certificate     /etc/letsencrypt/live/xiaodingyang.art/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/xiaodingyang.art/privkey.pem;

    root /var/www/myblog/frontend/dist;

    location = /robots.txt {
        default_type text/plain;
        charset utf-8;
        try_files $uri =404;
        access_log off;
    }

    location / {
        return 301 https://www.xiaodingyang.art$request_uri;
    }
}

# -----------------------------------------------------------------------------
# HTTPS 主站（www）— 站点主体
# -----------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    server_name www.xiaodingyang.art;

    # ssl_certificate     /etc/letsencrypt/live/xiaodingyang.art/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/xiaodingyang.art/privkey.pem;

    root /var/www/myblog/frontend/dist;
    index index.html;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_buffers 16 8k;

    # 静态资源缓存（JS/CSS/图片等带 hash 的文件长期缓存）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # 后端 API 代理（禁止浏览器对 JSON 启发式缓存；上游常带 ETag 且无 Cache-Control）
    location /api/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header ETag;
        proxy_hide_header Last-Modified;
        add_header Cache-Control "private, no-store, no-cache, must-revalidate, max-age=0" always;

        # 启用缓存（需先在 http 块配置 proxy_cache_path）
        # proxy_cache blog_cache;
        # proxy_cache_valid 200 10m;
        # proxy_cache_key "$request_uri$is_args$args";
        # proxy_cache_bypass $http_cache_control;
        # add_header X-Cache-Status $upstream_cache_status;
    }

    # 上传文件代理（^~ 确保优先于静态资源正则匹配）
    location ^~ /uploads/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
    }

    # Sitemap 代理（由后端动态生成）
    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_hide_header ETag;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }

    # robots.txt（与 HTTP/裸域一致：静态直出）
    location = /robots.txt {
        default_type text/plain;
        charset utf-8;
        try_files $uri =404;
        access_log off;
    }

    # SPA 入口始终拉最新：避免浏览器/CDN 长期缓存旧 index.html；前端为 browser history，/article/xxx、/admin/login 等均依赖本段 fallback
    location = /index.html {
        if_modified_since off;
        etag off;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        # 部分 CDN 认 Surrogate-Control，与 Cache-Control 双写降低「HTML 被边缘强缓存」概率
        add_header Surrogate-Control "no-store" always;
    }

    # SPA 前端路由 fallback — 所有未匹配的路径返回 index.html
    # 显式禁用本 location 的缓存：避免仅靠 internal redirect 到 /index.html 时，边缘 CDN
    # 仍按「原始 URL」缓存整页 HTML，导致内联 BUILD_VERSION 与 localStorage 永远一致、无法热更新。
    location / {
        if_modified_since off;
        etag off;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Surrogate-Control "no-store" always;
        try_files $uri $uri/ /index.html;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
