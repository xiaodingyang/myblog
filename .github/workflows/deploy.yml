name: Deploy Blog

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "18.20.8"
  PNPM_VERSION: "10"
  REMOTE_DIR: /var/www/myblog

jobs:
  # ──────────────────────────────────────────────
  # Build frontend + Deploy everything
  # ──────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      # ── Build ──
      - name: Install & build frontend
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      # ── SSH Setup ──
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      # ── Rsync: 先传所有文件，再远程操作 ──
      - name: Upload frontend dist
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_deploy" \
            frontend/dist/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.REMOTE_DIR }}/frontend/dist/

      - name: Upload backend source
        run: |
          rsync -avz --delete \
            --exclude node_modules \
            --exclude .env \
            --exclude uploads \
            -e "ssh -i ~/.ssh/id_deploy" \
            backend/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.REMOTE_DIR }}/backend/

      - name: Upload nginx reference (compare on server; do not auto-overwrite system nginx)
        run: |
          ssh -i ~/.ssh/id_deploy ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "mkdir -p ${{ env.REMOTE_DIR }}/config"
          rsync -avz \
            -e "ssh -i ~/.ssh/id_deploy" \
            config/nginx.conf \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.REMOTE_DIR }}/config/nginx.conf.from-repo

      # ── Remote: 安装依赖 + 重启服务（一次 SSH） ──
      - name: Install deps & restart services
        run: |
          ssh -i ~/.ssh/id_deploy ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'REMOTE'
            set -e

            echo "📦 Installing backend dependencies..."
            cd ${{ env.REMOTE_DIR }}/backend
            pnpm install --frozen-lockfile 2>/dev/null || pnpm install --no-optional

            echo "🔄 Restarting backend (pm2)..."
            # 线上常见：Nginx /api 指向 blog-backend（ecosystem 里 PORT=8081），与历史 blog-api（多为 3000）并存；两者都重启以免只热更其一
            if pm2 describe blog-backend >/dev/null 2>&1; then
              pm2 restart blog-backend --update-env || true
            fi
            if pm2 describe blog-api >/dev/null 2>&1; then
              pm2 restart blog-api --update-env || true
            fi
            if ! pm2 describe blog-backend >/dev/null 2>&1 && ! pm2 describe blog-api >/dev/null 2>&1; then
              pm2 start src/index.js --name blog-api
            fi
            sleep 3

            echo "🔎 Upstream health on server (Node /health):"
            ok=0
            for port in 8081 3000; do
              code=$(curl -sf -o /dev/null -w "%{http_code}" "http://127.0.0.1:${port}/health" || echo 000)
              echo "  127.0.0.1:${port}/health -> HTTP ${code}"
              if [ "$code" = "200" ]; then ok=1; fi
            done
            if [ "$ok" != "1" ] && [ -f ecosystem.config.js ]; then
              echo "⚠️ Retrying blog-backend with clean pm2 start..."
              pm2 delete blog-backend 2>/dev/null || true
              pm2 start ecosystem.config.js --only blog-backend
              sleep 3
              ok=0
              for port in 8081 3000; do
                code=$(curl -sf -o /dev/null -w "%{http_code}" "http://127.0.0.1:${port}/health" || echo 000)
                echo "  (retry) 127.0.0.1:${port}/health -> HTTP ${code}"
                if [ "$code" = "200" ]; then ok=1; fi
              done
            fi
            if [ "$ok" != "1" ]; then
              echo "❌ No healthy Node on 8081/3000 — pm2 list + blog-backend logs:"
              pm2 list
              pm2 logs blog-backend --lines 80 --nostream 2>&1 || true
              pm2 logs blog-api --lines 40 --nostream 2>&1 || true
              exit 1
            fi

            pm2 save

            echo "🔄 Reloading Nginx..."
            nginx -t && nginx -s reload

            echo "ℹ️  GitHub 登录依赖 Nginx 将 /api 反代到 PM2 blog-backend 端口（见 backend/ecosystem.config.js，默认 8081；参考仓库 config/nginx.conf）。若仍 404 请核对线上 Nginx 与仓库示例是否一致。"
            echo "✅ Remote operations complete"
          REMOTE

      # ── Health check ──
      - name: Health check
        run: |
          echo "⏳ Waiting for service to stabilize..."
          sleep 5
          for i in 1 2 3 4 5; do
            HOME=$(curl -sf -o /dev/null -w "%{http_code}" https://www.xiaodingyang.art/ || true)
            API=$(curl -sf -o /dev/null -w "%{http_code}" "https://www.xiaodingyang.art/api/articles?page=1&pageSize=1" || true)
            if [ "$HOME" = "200" ] && [ "$API" = "200" ]; then
              echo "✅ Health check passed (home HTTP $HOME, api HTTP $API)"
              exit 0
            fi
            echo "⏳ Attempt $i: home=$HOME api=$API, retrying in 5s..."
            sleep 5
          done
          echo "❌ Health check failed after 5 attempts"
          exit 1

      # ── 微信通知：成功 ──（Server 酱等非 2xx 时 curl -f 会失败；不应把整次部署标红）
      - name: Notify WeChat (success)
        if: success()
        continue-on-error: true
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:'%s')
          COMMIT_AUTHOR=$(git log -1 --pretty=format:'%an')
          COMMIT_SHA=$(git log -1 --pretty=format:'%h')
          DEPLOY_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')

          curl -sf -X POST "https://sctapi.ftqq.com/${{ secrets.WECHAT_SEND_KEY }}.send" \
            -d "title=✅ 博客部署成功" \
            -d "desp=## 部署通知

          **状态**: ✅ 部署成功

          **时间**: ${DEPLOY_TIME}

          **提交者**: ${COMMIT_AUTHOR}

          **提交信息**: ${COMMIT_MSG}

          **Commit**: [\`${COMMIT_SHA}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

          **站点**: [xiaodingyang.art](https://www.xiaodingyang.art)

          ---
          *GitHub Actions · Run [#${{ github.run_number }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})*"

      # ── 微信通知：失败 ──（同上，避免通知接口拖垮 workflow 结论）
      - name: Notify WeChat (failure)
        if: failure()
        continue-on-error: true
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:'%s')
          DEPLOY_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')

          curl -sf -X POST "https://sctapi.ftqq.com/${{ secrets.WECHAT_SEND_KEY }}.send" \
            -d "title=❌ 博客部署失败" \
            -d "desp=## 部署通知

          **状态**: ❌ 部署失败

          **时间**: ${DEPLOY_TIME}

          **提交信息**: ${COMMIT_MSG}

          **详情**: [查看日志](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

          ---
          *请检查构建日志排查问题*"
