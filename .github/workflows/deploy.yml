name: Deploy Blog

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "18.20.8"
  PNPM_VERSION: "10"
  REMOTE_DIR: /var/www/myblog

jobs:
  # ──────────────────────────────────────────────
  # Build frontend + Deploy everything
  # ──────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      # ── Build ──
      - name: Install & build frontend
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      # ── SSH Setup ──
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      # ── Rsync: 先传所有文件，再远程操作 ──
      - name: Upload frontend dist
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_deploy" \
            frontend/dist/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.REMOTE_DIR }}/frontend/dist/

      - name: Upload backend source
        run: |
          rsync -avz --delete \
            --exclude node_modules \
            --exclude .env \
            --exclude uploads \
            -e "ssh -i ~/.ssh/id_deploy" \
            backend/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.REMOTE_DIR }}/backend/

      # ── Remote: 安装依赖 + 重启服务（一次 SSH） ──
      - name: Install deps & restart services
        run: |
          ssh -i ~/.ssh/id_deploy ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'REMOTE'
            set -e

            echo "📦 Installing backend dependencies..."
            cd ${{ env.REMOTE_DIR }}/backend
            pnpm install --frozen-lockfile 2>/dev/null || pnpm install --no-optional

            echo "🔄 Restarting backend (pm2)..."
            pm2 restart blog-api 2>/dev/null || pm2 start src/index.js --name blog-api
            pm2 save

            echo "🔄 Reloading Nginx..."
            nginx -t && nginx -s reload

            echo "✅ Remote operations complete"
          REMOTE

      # ── Health check ──
      - name: Health check
        run: |
          echo "⏳ Waiting for service to stabilize..."
          sleep 5
          for i in 1 2 3; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://www.xiaodingyang.art/api/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed (HTTP $STATUS)"
              exit 0
            fi
            echo "⏳ Attempt $i: HTTP $STATUS, retrying in 5s..."
            sleep 5
          done
          echo "❌ Health check failed after 3 attempts"
          exit 1

      # ── 微信通知：成功 ──
      - name: Notify WeChat (success)
        if: success()
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:'%s')
          COMMIT_AUTHOR=$(git log -1 --pretty=format:'%an')
          COMMIT_SHA=$(git log -1 --pretty=format:'%h')
          DEPLOY_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')

          curl -sf -X POST "https://sctapi.ftqq.com/${{ secrets.WECHAT_SEND_KEY }}.send" \
            -d "title=✅ 博客部署成功" \
            -d "desp=## 部署通知

          **状态**: ✅ 部署成功

          **时间**: ${DEPLOY_TIME}

          **提交者**: ${COMMIT_AUTHOR}

          **提交信息**: ${COMMIT_MSG}

          **Commit**: [\`${COMMIT_SHA}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

          **站点**: [xiaodingyang.art](https://www.xiaodingyang.art)

          ---
          *GitHub Actions · Run [#${{ github.run_number }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})*"

      # ── 微信通知：失败 ──
      - name: Notify WeChat (failure)
        if: failure()
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:'%s')
          DEPLOY_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')

          curl -sf -X POST "https://sctapi.ftqq.com/${{ secrets.WECHAT_SEND_KEY }}.send" \
            -d "title=❌ 博客部署失败" \
            -d "desp=## 部署通知

          **状态**: ❌ 部署失败

          **时间**: ${DEPLOY_TIME}

          **提交信息**: ${COMMIT_MSG}

          **详情**: [查看日志](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

          ---
          *请检查构建日志排查问题*"
