# ============================================
# 可扩展的 Nginx 配置方案
# ============================================
# 设计原则：
# 1. 统一端口规划：8080-8089 为后端服务端口段
# 2. 统一路径规范：/api/v{version}/{service}
# 3. 动态 CORS 配置：支持多域名白名单
# 4. 服务隔离：每个后端服务独立 location
# ============================================

# CORS 白名单映射（使用 map 指令动态匹配）
map $http_origin $cors_origin {
    default "";
    "~^https://.*\.vercel\.app$" $http_origin;  # 所有 Vercel 域名
    "https://www.xiaodingyang.art" $http_origin;  # 主域名
    "https://xiaodingyang.art" $http_origin;      # 裸域名
    "http://localhost:8000" $http_origin;         # 本地开发
}

# 后端服务上游配置（便于负载均衡和健康检查）
upstream blog_backend_v1 {
    server 127.0.0.1:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream blog_backend_v2 {
    server 127.0.0.1:8081 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# 未来可扩展的后端服务示例
# upstream new_service {
#     server 127.0.0.1:8082 max_fails=3 fail_timeout=30s;
#     keepalive 32;
# }

server {
    server_name xiaodingyang.art www.xiaodingyang.art;

    # 前端静态文件
    root /var/www/myblog/frontend/dist;
    index index.html;

    # ============================================
    # 通用配置
    # ============================================

    # Gzip 压缩优化
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml application/x-javascript text/x-js application/vnd.ms-fontobject application/x-font-ttf font/opentype;

    # index.html 不缓存
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }

    # 静态资源长期缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ============================================
    # 后端 API 代理配置（按版本和服务划分）
    # ============================================

    # 博客后端 API v1（旧版本，端口 3000）
    location /api/v1/blog/ {
        # 移除 /api/v1/blog 前缀，转发到后端的 /api/
        rewrite ^/api/v1/blog/(.*)$ /api/$1 break;

        proxy_pass http://blog_backend_v1;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # 动态 CORS 配置
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # 博客后端 API v2（新版本，端口 8081）
    location /api/v2/blog/ {
        # 移除 /api/v2/blog 前缀，转发到后端的 /api/
        rewrite ^/api/v2/blog/(.*)$ /api/$1 break;

        proxy_pass http://blog_backend_v2;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # 动态 CORS 配置
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # 未来新服务示例（端口 8082）
    # location /api/v1/new-service/ {
    #     rewrite ^/api/v1/new-service/(.*)$ /api/$1 break;
    #
    #     proxy_pass http://new_service;
    #     proxy_http_version 1.1;
    #     proxy_set_header Connection "";
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #
    #     proxy_read_timeout 60s;
    #     proxy_connect_timeout 10s;
    #
    #     add_header Access-Control-Allow-Origin $cors_origin always;
    #     add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    #     add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
    #     add_header Access-Control-Allow-Credentials "true" always;
    #
    #     if ($request_method = OPTIONS) {
    #         return 204;
    #     }
    # }

    # ============================================
    # 兼容旧路径（向后兼容，逐步废弃）
    # ============================================

    # 兼容旧的 /api/ 路径（转发到 v1）
    location /api/ {
        proxy_pass http://blog_backend_v1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # 兼容旧的 /vercel-api/ 路径（转发到 v2）
    location /vercel-api/ {
        rewrite ^/vercel-api/(.*)$ /api/$1 break;

        proxy_pass http://blog_backend_v2;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ============================================
    # 文件上传和静态资源
    # ============================================

    # 上传文件代理（v1 后端）
    location ^~ /uploads/ {
        proxy_pass http://blog_backend_v1;
        proxy_set_header Host $host;

        # 支持大文件上传
        client_max_body_size 50M;
    }

    # ============================================
    # SEO 相关
    # ============================================

    # Sitemap（由后端动态生成）
    location = /sitemap.xml {
        proxy_pass http://blog_backend_v1;
        proxy_set_header Host $host;
    }

    # robots.txt
    location = /robots.txt {
        try_files $uri =404;
    }

    # ============================================
    # 前端 SPA 路由
    # ============================================

    # SPA fallback
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
        try_files $uri $uri/ /index.html;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ============================================
    # SSL 配置
    # ============================================

    listen 443 ssl http2;
    ssl_certificate /etc/letsencrypt/live/xiaodingyang.art/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xiaodingyang.art/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}

# HTTP 重定向到 HTTPS
server {
    listen 80;
    server_name xiaodingyang.art www.xiaodingyang.art;
    return 301 https://$host$request_uri;
}
